name: ERP GOLD MAIN Auto Deploy (IIS + Node + NSSM)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # -------------------------------------------------
      # 1️⃣ JOB START TIME (IST)
      # -------------------------------------------------
      - name: Capture Job Start Time (IST)
        shell: powershell
        run: |
          $log = "D:\Action-Runners\erp-gold-main-runner\_diag\job-runtime-IST.log"
          "START | $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') | Repo=$env:GITHUB_REPOSITORY | RunId=$env:GITHUB_RUN_ID" | Out-File -Append $log

      # -------------------------------------------------
      # 2️⃣ CHECKOUT SOURCE
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      # -------------------------------------------------
      # 3️⃣ SETUP NODE
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------------------------------
      # 4️⃣ COPY BACKEND TO IIS
      # -------------------------------------------------
      - name: Sync backend code to IIS
        shell: powershell
        run: |
          $src = "$env:GITHUB_WORKSPACE\backend"
          $dest = "C:\inetpub\wwwroot\ERP-Gold-Main\server"

          if (!(Test-Path $src)) {
            Write-Error "Backend folder missing: $src"
            exit 1
          }

          robocopy $src $dest /MIR /XD node_modules
          if ($LASTEXITCODE -gt 7) {
            exit $LASTEXITCODE
          }

      # -------------------------------------------------
      # 5️⃣ INSTALL BACKEND DEPENDENCIES
      # -------------------------------------------------
      - name: Install backend dependencies
        shell: powershell
        run: |
          Set-Location "C:\inetpub\wwwroot\ERP-Gold-Main\server"

          if (Test-Path "package-lock.json") {
            npm ci --legacy-peer-deps
          }
          else {
            npm install --legacy-peer-deps
          }

      # -------------------------------------------------
      # 6️⃣ START / RESTART NODE SERVICE
      # -------------------------------------------------
      - name: Start Node backend (NSSM)
        shell: powershell
        run: |
          $name = "ERP-GOLD-MAIN"
          $nssm = "C:\Windows\System32\nssm.exe"
          $node = "C:\Program Files\nodejs\node.exe"
          $app = "C:\inetpub\wwwroot\ERP-Gold-Main\server\https.js"
          $dir = "C:\inetpub\wwwroot\ERP-Gold-Main\server"

          if (!(Test-Path $nssm)) {
            Write-Error "NSSM not found at $nssm"
            exit 1
          }

          $svc = Get-Service -Name $name -ErrorAction SilentlyContinue

          if ($svc) {
            if ($svc.Status -ne "Stopped") {
              & $nssm stop $name
              Start-Sleep -Seconds 5
            }

            & $nssm start $name
          }
          else {
            & $nssm install $name $node $app
            & $nssm set $name AppDirectory $dir
            & $nssm set $name Start SERVICE_AUTO_START
            & $nssm set $name AppStdout "$dir\node-out.log"
            & $nssm set $name AppStderr "$dir\node-err.log"
            & $nssm start $name
          }

      # -------------------------------------------------
      # 7️⃣ INSTALL FRONTEND DEPENDENCIES
      # -------------------------------------------------
      - name: Install frontend dependencies
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          if (Test-Path "package-lock.json") {
            npm ci --legacy-peer-deps
          }
          else {
            npm install --legacy-peer-deps
          }

      # -------------------------------------------------
      # 8️⃣ BUILD FRONTEND
      # -------------------------------------------------
      - name: Build frontend
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE

          $env:CI = "false"
          $env:GENERATE_SOURCEMAP = "false"

          npm run build

      # -------------------------------------------------
      # 9️⃣ DEPLOY FRONTEND TO IIS
      # -------------------------------------------------
      - name: Deploy frontend to IIS
        shell: powershell
        run: |
          robocopy build C:\inetpub\wwwroot\ERP-Gold-Main\build /MIR /XF web.config

          if ($LASTEXITCODE -gt 7) {
            exit $LASTEXITCODE
          }

      # -------------------------------------------------
      # 🔟 JOB END TIME (IST)
      # -------------------------------------------------
      - name: Capture Job End Time (IST)
        if: always()
        shell: powershell
        run: |
          $log = "D:\Action-Runners\erp-gold-main-runner\_diag\job-runtime-IST.log"
          "END | $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') | Repo=$env:GITHUB_REPOSITORY | RunId=$env:GITHUB_RUN_ID | Status=${{ job.status }}" | Out-File -Append $lo
